<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat en Go</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        #mensajes {
            border: 1px solid #ccc;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
        }
        input {
            width: 70%;
            padding: 8px;
        }
        button {
            padding: 8px 16px;
        }
    </style>
</head>
<body>
    <h1>Chat en Tiempo Real</h1>

    <div id="mensajes"></div>

    <input type="text" id="mensaje" placeholder="Escribe un mensaje..."/>
    <button onclick="enviar()">Enviar</button>

    <script>
        function enviar() {
            alert("¡Próximamente conectado con WebSocket!");
        }
    </script>
</body>
</html>
