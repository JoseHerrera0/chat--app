<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat en Go</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        #mensajes {
            border: 1px solid #ccc;
            height: 300px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 10px;
        }
        input {
            width: 70%;
            padding: 8px;
        }
        button {
            padding: 8px 16px;
        }
    </style>
</head>
<body>
    <h1>Chat en Tiempo Real</h1>

    <div id="mensajes"></div>

    <input type="text" id="mensaje" placeholder="Escribe un mensaje..."/>
    <button onclick="enviar()">Enviar</button>

    <script>
        const username = prompt("¿Cuál es tu nombre?") || "anonimo";
        const room = prompt("¿A qué sala quieres entrar?") || "general";

        const ws = new WebSocket(`ws://localhost:8080/ws?username=${username}&room=${room}`);

        ws.onmessage = function(event) {
            const msg = JSON.parse(event.data);
            const div = document.getElementById("mensajes");
            div.innerHTML += `<p><b>${msg.username}:</b> ${msg.content}</p>`;
            div.scrollTop = div.scrollHeight;
        };

        function enviar() {
            const input = document.getElementById("mensaje");
            if (input.value === "") return;

            ws.send(JSON.stringify({
                type: "chat",
                content: input.value
            }));

            input.value = "";
        }

        document.getElementById("mensaje").addEventListener("keypress", function(e) {
            if (e.key === "Enter") enviar();
        });
    </script>
</body>
</html>
